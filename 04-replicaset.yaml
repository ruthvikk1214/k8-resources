apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myreplicaset
  labels:
    app: roboshop
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roboshop
      env: dev
  template:
    metadata:
      labels:
        app: roboshop
        env: dev
    spec:
      containers:
        - name: myapp
          image: nginx
